name: LLM QA Demo

on:
  workflow_dispatch:
    inputs:
      run_full:
        description: 'Run full LLM QA suite'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      run_security_eval:
        description: 'Run adversarial security evaluation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  pull_request:
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/llm-qa.yml'

  push:
    branches: [ main, master ]

  schedule:
    - cron: '0 6 * * 1'

env:
  OLLAMA_BASE_URL: http://localhost:11434
  OLLAMA_MODEL: qwen3:8b

jobs:
  smoke:
    name: Smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama..."
            sleep 2
          done

          ollama pull $OLLAMA_MODEL
          ollama list

      - name: Run smoke tests
        run: ./gradlew smokeTest --no-daemon -Dollama.baseUrl=$OLLAMA_BASE_URL -Dollama.model=$OLLAMA_MODEL

      - name: Upload smoke test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: |
            build/reports/tests/
            build/test-results/
            ollama.log

  full:
    name: Full suite
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' && github.event.inputs.run_full == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &

          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama..."
            sleep 2
          done

          ollama pull $OLLAMA_MODEL
          ollama list

      - name: Run full tests
        run: ./gradlew fullTest --no-daemon -Dollama.baseUrl=$OLLAMA_BASE_URL -Dollama.model=$OLLAMA_MODEL

      - name: Upload full test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-reports
          path: |
            build/reports/tests/
            build/test-results/
            ollama.log

  security-eval:
    name: Security evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: smoke
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_security_eval == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &

          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama..."
            sleep 2
          done

          ollama pull $OLLAMA_MODEL
          ollama list

      - name: Run security evaluation
        run: ./gradlew securityEval --no-daemon -Dollama.baseUrl=$OLLAMA_BASE_URL -Dollama.model=$OLLAMA_MODEL

      - name: Upload security evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-eval-reports
          path: |
            build/reports/tests/
            build/test-results/
            ollama.log