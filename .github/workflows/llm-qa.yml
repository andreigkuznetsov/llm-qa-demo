name: LLM QA Demo

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/llm-qa.yml'
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  smoke:
    name: Smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          sleep 5
          ollama pull qwen3:8b

      - name: Run smoke tests
        run: ./gradlew smokeTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: build/reports/tests/

  full:
    name: Full suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          sleep 5
          ollama pull qwen3:8b

      - name: Run full tests
        run: ./gradlew fullTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-reports
          path: build/reports/tests/
